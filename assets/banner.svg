<svg width="920" height="280" viewBox="0 0 920 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Guilherme Araújo de Oliveira — Engenheiro-designer, do backend ao pixel">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1512"/>
      <stop offset="100%" stop-color="#0F1C18"/>
    </linearGradient>
    <radialGradient id="glow" cx="15%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#3E8E7E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3E8E7E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#3E8E7E" stroke-width="1" opacity="0.08"/>
    </pattern>
    <radialGradient id="gridMask" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <mask id="fadeMask">
      <rect width="920" height="280" fill="url(#gridMask)"/>
    </mask>
  </defs>

  <!-- base -->
  <rect width="920" height="280" fill="url(#bgGrad)"/>
  <rect width="920" height="280" fill="url(#glow)"/>
  <rect width="920" height="280" fill="url(#grid)" mask="url(#fadeMask)"/>

  <!-- monograma GA -->
  <rect x="40" y="34" width="44" height="44" rx="10" fill="#13251F" stroke="#C9A46A" stroke-width="1"/>
  <text x="62" y="63" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" fill="#C9A46A" text-anchor="middle">GA</text>

  <!-- nome -->
  <text x="100" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="600" fill="#ECE9DC">Guilherme Araújo de Oliveira</text>

  <!-- filete dourado (draw-on) -->
  <line x1="100" y1="90" x2="560" y2="90" stroke="#C9A46A" stroke-width="2" stroke-dasharray="460" stroke-dashoffset="460">
    <animate attributeName="stroke-dashoffset" from="460" to="0" dur="1.1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </line>

  <!-- subtítulo -->
  <text x="100" y="118" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace" font-size="14" fill="#B9BCA9">Engenheiro-designer — backend em Java &amp; Spring, com olhar de produto.</text>

  <!-- tagline -->
  <text x="100" y="146" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace" font-size="12" letter-spacing="3" fill="#C9A46A">DO BACKEND AO PIXEL</text>

  <!-- terminal -->
  <rect x="100" y="168" width="560" height="94" rx="10" fill="#101F1A" stroke="#22332C" stroke-width="1"/>
  <circle cx="118" cy="184" r="4" fill="#3E8E7E" opacity="0.7"/>
  <circle cx="132" cy="184" r="4" fill="#3E8E7E" opacity="0.45"/>
  <circle cx="146" cy="184" r="4" fill="#3E8E7E" opacity="0.25"/>

  <g font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace" font-size="13" fill="#ECE9DC">
    <g clip-path="url(#clipL1)">
      <text x="118" y="206">$ whoami</text>
    </g>
    <g clip-path="url(#clipL2)">
      <text x="118" y="224" fill="#8A8E7C">&gt; guilherme araújo — eng. backend &amp; ui</text>
    </g>
    <g clip-path="url(#clipL3)">
      <text x="118" y="242">$ stack --list</text>
    </g>
    <g clip-path="url(#clipL4)">
      <text x="118" y="260" fill="#8A8E7C">&gt; java · spring · react · python · figma</text>
    </g>
  </g>

  <defs>
    <clipPath id="clipL1"><rect x="112" y="195" height="16" width="0"><animate attributeName="width" from="0" to="80" dur="0.5s" begin="0.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="clipL2"><rect x="112" y="213" height="16" width="0"><animate attributeName="width" from="0" to="320" dur="0.9s" begin="1.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="clipL3"><rect x="112" y="231" height="16" width="0"><animate attributeName="width" from="0" to="130" dur="0.5s" begin="2.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="clipL4"><rect x="112" y="249" height="16" width="0"><animate attributeName="width" from="0" to="340" dur="0.9s" begin="3s" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- cursor piscando -->
  <rect x="450" y="249" width="8" height="14" fill="#C9A46A">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" begin="3.9s" repeatCount="indefinite"/>
  </rect>

  <!-- selo disponibilidade -->
  <g transform="translate(700,36)">
    <rect width="180" height="28" rx="14" fill="#13251F" stroke="#3E8E7E" stroke-width="1"/>
    <circle cx="18" cy="14" r="4" fill="#3E8E7E"/>
    <text x="32" y="18" font-family="ui-monospace, 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace" font-size="10.5" letter-spacing="0.5" fill="#B9BCA9">DISPONÍVEL P/ VAGAS</text>
  </g>
</svg>
